{% extends 'base.html' %}
{% block title %}Edit Profile — MACE{% endblock %}

{% block content %}
<div class="page-header"><h2>Edit Profile</h2></div>
<div class="form-card" style="max-width:480px;">
  <h3><i class="fas fa-edit" style="margin-right:8px;color:var(--gold)"></i>Update Details</h3>
  <form method="POST">
    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" name="phone" value="{{ student.phone or '' }}" placeholder="e.g. 9876543210"/>
    </div>
    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
      <a href="{{ url_for('student_profile') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
